<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Angeline Garcia</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* Contact Page Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e8d5f5 50%, #d4b8e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .contact-container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .contact-container h1 {
            color: #4C1D95;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .contact-container .subtitle {
            text-align: center;
            color: #7e57c2;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #4C1D95;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #d1c4e9;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: #f8f0ff;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #8B5CF6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #8B5CF6, #6D28D9);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 25px;
        }

        .social-links a {
            color: #4C1D95;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            padding: 8px 16px;
            background: #f8f0ff;
            border-radius: 50px;
        }

        .social-links a:hover {
            color: #8B5CF6;
            background: #ede0ff;
        }

        /* Success Message */
        .success-message {
            display: none;
            text-align: center;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 12px;
            color: #2e7d32;
            font-weight: 500;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="contact-container">

        <h1>📬 Get in Touch</h1>
        <p class="subtitle">I'd love to hear from you — feel free to send me a message!</p>

        <!-- Success Message -->
        <div id="successMessage" class="success-message">
            ✅ Thank you! Your message has been sent successfully.
        </div>

        <!-- Contact Form -->
        <form id="contactForm" action="https://formsubmit.co/anglngleragrca@gmail.com" method="POST">

            <!-- FormSubmit Options (Optional but Useful) -->
            <input type="hidden" name="_subject" value="New Message from Portfolio" />
            <input type="hidden" name="_captcha" value="true" />
            <input type="hidden" name="_next" value="https://ange1605.github.io/profile/contact.html" />

            <div class="form-group">
                <label for="name">👤 Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required />
            </div>

            <div class="form-group">
                <label for="email">📧 Your Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
                <label for="message">💬 Your Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
            </div>

            <button type="submit" class="btn">Send Message ✨</button>

        </form>

        <!-- Social Links -->
        <div class="social-links">
            <a href="mailto:anglngleragrca@gmail.com">📧 Email</a>
            <a href="https://facebook.com/yourusername" target="_blank">📘 Facebook</a>
            <a href="https://ange1605.github.io/profile/">🏠 Home</a>
        </div>

    </div>

    <script>
        // Show success message on form submit
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            // Let the form submit naturally to FormSubmit
            // But show a success message after a short delay
            setTimeout(function() {
                document.getElementById('successMessage').classList.add('show');
            }, 500);
        });
    </script>

</body>
</html>
